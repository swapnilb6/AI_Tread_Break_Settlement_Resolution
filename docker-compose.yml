services:
  postgres:
    image: postgres:16
    container_name: cm_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradebreaks}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  bootstrap:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cm_bootstrap
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-docker}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-tradebreaks}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppassword}
      CHROMA_PATH: /app/storage/chroma
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-policy_knowledge_base}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      PYTHONPATH: /app
      CREWAI_DISABLE_TELEMETRY: "true"
      OTEL_SDK_DISABLED: "true"

    volumes:
      - ./:/app
      - chroma_data:/app/storage/chroma
    command: >
      python -m app.bootstrap --data-dir /app/data/synthetic --policy-dir /app/data/policies --skip-rag
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cm_api
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: ${APP_ENV:-docker}
      APP_NAME: ${APP_NAME:-Capital Markets Exception Resolution Agent}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-tradebreaks}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppassword}
      CHROMA_PATH: /app/storage/chroma
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-policy_knowledge_base}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      API_BASE_URL: http://api:8000    
      PYTHONPATH: /app
      CREWAI_DISABLE_TELEMETRY: "true"
      OTEL_SDK_DISABLED: "true"

    volumes:
      - ./:/app
      - chroma_data:/app/storage/chroma
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cm_ui
    command: streamlit run app/ui/streamlit_app.py --server.address=0.0.0.0 --server.port=8501
    environment:
      APP_ENV: ${APP_ENV:-docker}
      API_BASE_URL: http://api:8000
      CHROMA_PATH: /app/storage/chroma
      PYTHONPATH: /app
    volumes:
      - ./:/app
      - chroma_data:/app/storage/chroma
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  chroma_data: